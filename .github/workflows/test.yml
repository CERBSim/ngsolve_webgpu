name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  BASE_IMAGE: ghcr.io/cerbsim/webgpu-base

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull base image
        run: docker pull ${{ env.BASE_IMAGE }}:latest

      - name: Build test image
        run: docker build -f tests/Dockerfile --build-arg BASE_IMAGE=${{ env.BASE_IMAGE }}:latest -t ngsolve-webgpu-tests .

      - name: Run tests
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/tests/output:/app/tests/output \
            ngsolve-webgpu-tests

      - name: Upload test output
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-output
          path: tests/output/